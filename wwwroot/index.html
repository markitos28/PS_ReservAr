<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ReservAr - Inicio</title>
    <link rel="stylesheet" href="./css/index.css" />
</head>

<body>
    <main class="home-page" data-sys-render="auto">
        <header class="navbar">
            <div class="brand">
                <h1>ReservAr</h1>
                <span id="welcomeUser">Eventos en cartelera</span>
            </div>

            <nav id="navActions" class="nav-actions"></nav>
        </header>

        <section class="hero">
            <h2>Encontrá tu próximo evento</h2>
            <p>Buscá eventos por nombre, fecha, horario o lugar y reservá tu asiento.</p>
        </section>

        <section class="filters-card">
            <div class="filter-group">
                <label for="searchName">Nombre del evento</label>
                <input type="text" id="searchName" placeholder="Ej: Rock, Teatro..." />
            </div>

            <div class="filter-group">
                <label for="searchDate">Fecha</label>
                <input type="date" id="searchDate" />
            </div>

            <div class="filter-group">
                <label for="searchTime">Horario</label>
                <input type="time" id="searchTime" />
            </div>

            <div class="filter-group">
                <label for="searchVenue">Lugar</label>
                <input type="text" id="searchVenue" placeholder="Ej: Niceto, Luna Park..." />
            </div>

            <div class="filter-actions">
                <button id="searchButton" class="btn btn-primary">Buscar</button>
                <button id="clearButton" class="btn btn-outline">Limpiar</button>
            </div>
        </section>

        <section class="events-section">
            <div class="section-header">
                <h3>Eventos disponibles</h3>
                <span id="eventsCount"></span>
            </div>

            <div id="loadingMessage" class="loading-message hidden">
                Cargando eventos...
            </div>

            <div id="errorMessage" class="error-message hidden"></div>

            <div id="eventsContainer" class="events-grid"></div>
        </section>
    </main>

    <script src="./js/index.js"></script>
</body>

</html>
