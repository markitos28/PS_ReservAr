<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ReservAr - Login</title>
    <link rel="stylesheet" href="./css/login.css" />
</head>

<body>
    <main class="login-page" data-sys-render="auto">
        <section class="login-card">
            <div class="login-header">
                <h1>ReservAr</h1>
                <p>Ingresá con tu usuario para continuar</p>
            </div>

            <form id="loginForm" class="login-form">
                <div class="form-group">
                    <label for="email">Correo electrónico</label>
                    <input type="email" id="email" name="email" placeholder="usuario@correo.com" required />
                </div>

                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <div class="password-wrapper">
                        <input type="password" id="password" name="password" placeholder="********" required />
                        <button type="button" id="togglePassword" class="toggle-password">
                            Ver
                        </button>
                    </div>
                </div>

                <div class="form-options">
                    <a href="/forgot-password.html" class="forgot-link">¿Olvidaste tu contraseña?</a>
                </div>

                <button type="submit" id="loginButton" class="login-button">
                    Ingresar
                </button>

                <div id="loadingMessage" class="loading-message hidden">
                    Validando credenciales...
                </div>

                <div id="errorMessage" class="error-message hidden"></div>
                <div id="successMessage" class="success-message hidden"></div>
            </form>
        </section>
    </main>

    <script src="./js/login.js"></script>
</body>

</html>
