<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ReservAr - Registro</title>
    <link rel="stylesheet" href="./css/signup.css" />
</head>

<body>
    <main class="signup-page" data-sys-render="auto">
        <section class="signup-card">
            <div class="signup-header">
                <h1>Crear cuenta</h1>
                <p>Registrate para ingresar a ReservAr</p>
            </div>

            <form id="signupForm" class="signup-form">
                <div class="form-group">
                    <label for="fullName">Nombre completo</label>
                    <input type="text" id="fullName" name="fullName" placeholder="Juan Pérez" required />
                </div>

                <div class="form-group">
                    <label for="email">Correo electrónico</label>
                    <input type="email" id="email" name="email" placeholder="usuario@correo.com" required />
                </div>

                <div class="form-group">
                    <label for="password">Contraseña</label>
                    <div class="password-wrapper">
                        <input type="password" id="password" name="password" placeholder="********" required />
                        <button type="button" id="togglePassword" class="toggle-password">
                            Ver
                        </button>
                    </div>
                </div>

                <div class="form-group">
                    <label for="confirmPassword">Confirmar contraseña</label>
                    <div class="password-wrapper">
                        <input type="password" id="confirmPassword" name="confirmPassword" placeholder="********"
                            required />
                        <button type="button" id="toggleConfirmPassword" class="toggle-password">
                            Ver
                        </button>
                    </div>
                </div>

                <button type="submit" id="signupButton" class="signup-button">
                    Registrarme
                </button>

                <div id="loadingMessage" class="loading-message hidden">
                    Registrando usuario...
                </div>

                <div id="errorMessage" class="error-message hidden"></div>
                <div id="successMessage" class="success-message hidden"></div>

                <div class="extra-links">
                    <span>¿Ya tenés cuenta?</span>
                    <a href="/login.html">Iniciar sesión</a>
                </div>
            </form>
        </section>
    </main>

    <script src="./js/signup.js"></script>
</body>

</html>
